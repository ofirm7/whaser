<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whaser — AI WhatsApp agent builder</title>
<style>
  :root { --bg:#0b141a; --panel:#111b21; --panel2:#202c33; --line:#2a3942; --text:#e9edef; --muted:#8696a0; --accent:#00a884; --accent2:#06cf9c; --danger:#f15c6d; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
  a { color:var(--accent2); }
  header { display:flex; align-items:center; gap:16px; padding:12px 18px; background:var(--panel); border-bottom:1px solid var(--line); }
  header .logo { font-weight:700; color:var(--accent2); font-size:18px; }
  header nav { display:flex; gap:6px; margin-inline-start:8px; }
  .menu { position:relative; margin-inline-start:8px; }
  .menu .menubtn { display:inline-flex; align-items:center; gap:6px; }
  .menu-panel { position:absolute; top:calc(100% + 6px); inset-inline-start:0; min-width:210px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:6px; box-shadow:0 10px 28px rgba(0,0,0,.45); z-index:1100; display:none; flex-direction:column; gap:2px; }
  .menu-panel.open { display:flex; }
  .menu-item { display:block; width:100%; text-align:start; background:transparent; border:none; color:var(--text); padding:10px 12px; border-radius:8px; cursor:pointer; font:inherit; }
  .menu-item:hover { background:var(--panel2); }
  .menu-item.active { background:var(--panel2); color:var(--accent2); font-weight:600; }
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin:14px 0; flex-wrap:wrap; }
  .tab { background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); padding:10px 18px; border-radius:8px 8px 0 0; cursor:pointer; font:inherit; font-size:15px; }
  .tab:hover { color:var(--text); background:var(--panel2); }
  .tab.active { color:var(--accent2); border-bottom-color:var(--accent2); font-weight:600; }
  header .spacer { flex:1; }
  header .who { color:var(--muted); font-size:13px; }
  button { font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--panel2); color:var(--text); padding:8px 14px; border-radius:8px; }
  button.primary { background:var(--accent); border-color:var(--accent); color:#04231c; font-weight:600; }
  button.danger { background:var(--danger); border-color:var(--danger); color:#2a0a0e; font-weight:600; }
  button.ghost { background:transparent; }
  button.nav { background:transparent; border-color:transparent; color:var(--muted); }
  button.nav.active { color:var(--text); background:var(--panel2); }
  button:disabled { opacity:.5; cursor:default; }
  select { font:inherit; background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; cursor:pointer; }
  select.lang { padding:6px 8px; font-size:13px; }
  input, textarea { font:inherit; background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:10px 12px; width:100%; }
  .wrap { max-width:880px; margin:0 auto; padding:22px 18px 60px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .row { display:flex; gap:12px; align-items:center; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
  .muted { color:var(--muted); }
  .badge { font-size:12px; padding:2px 9px; border-radius:999px; border:1px solid var(--line); }
  .badge.live { color:#04231c; background:var(--accent2); border-color:var(--accent2); }
  .badge.paused { color:var(--muted); }
  h1 { font-size:22px; margin:0 0 4px; } h2 { font-size:17px; margin:0 0 10px; }
  .chat { background:#0b141a; border:1px solid var(--line); border-radius:12px; padding:14px; height:360px; overflow:auto; display:flex; flex-direction:column; gap:8px; }
  .bub { max-width:78%; padding:8px 11px; border-radius:10px; white-space:pre-wrap; }
  .bub.bot { align-self:flex-start; background:var(--panel2); }
  .bub.me { align-self:flex-end; background:#005c4b; }
  .composer { display:flex; gap:8px; margin-top:10px; }
  pre { background:#0b141a; border:1px solid var(--line); border-radius:8px; padding:12px; overflow:auto; font-size:12.5px; direction:ltr; text-align:left; }
  .err { color:var(--danger); }
  .ok { color:var(--accent2); }
  .center { min-height:70vh; display:flex; align-items:center; justify-content:center; }
  .login { width:340px; }
  .login .langbar { display:flex; justify-content:flex-end; margin-bottom:6px; }
  label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  .pill { display:inline-block; font-size:12px; background:var(--panel2); border:1px solid var(--line); border-radius:999px; padding:2px 9px; margin:2px 0; margin-inline-end:4px; }
  .wa-av { display:inline-block; border-radius:50%; background:#3b4a54; color:#e9edef; text-align:center; vertical-align:middle; font-weight:600; background-size:cover; background-position:center; overflow:hidden; flex:0 0 auto; }
  .wa-av.grp { background:#1f5132; color:#d7f5e3; }
  .wa-av.img { background-color:transparent; color:transparent; }
  /* Chat-picker rows: fixed columns so checkboxes, avatars and names all line up. */
  .chatrow { display:grid; grid-template-columns:18px 34px 1fr 22px; align-items:center; gap:10px; margin:0; padding:7px 8px; border-radius:8px; cursor:pointer; }
  .chatrow:hover { background:var(--panel2); }
  .chatrow > input[type=checkbox] { width:17px; height:17px; min-width:17px; margin:0; accent-color:var(--accent); justify-self:center; cursor:pointer; }
  .chatname { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); font-size:14.5px; font-weight:500; }
  .chatbadge { text-align:center; font-size:13px; color:var(--muted); }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; padding:18px; z-index:1000; }
  .modal { width:400px; max-width:100%; max-height:calc(100vh - 36px); overflow-y:auto; margin:0; }
  .modal.wide { width:560px; }
  .modal.modal-xl { width:94vw; max-width:1150px; }
  .modal.modal-xl .chat { height:68vh !important; }
</style>

let lang = localStorage.getItem('whaser_lang') || 'en';
function t(s){ const d = I18N[lang]; return (d && d[s] != null) ? d[s] : s; }
function tf(s, ...a){ return t(s).replace(/\{(\d+)\}/g, (_, i) => (a[+i] != null ? a[+i] : '')); }
function locale(){ return lang === 'he' ? 'he-IL' : 'en-US'; }
function arrow(){ return lang === 'he' ? '←' : '→'; } // flow arrows read right-to-left in Hebrew
function applyDir(){ const el = document.documentElement; el.lang = lang; el.dir = (lang === 'he') ? 'rtl' : 'ltr'; }
function setLang(l){ if (l === lang) return; lang = l; localStorage.setItem('whaser_lang', l); applyDir(); render(); }
function langSelect(){ return `<select class="lang" title="${t('Language')}" aria-label="${t('Language')}">
  <option value="en"${lang==='en'?' selected':''}>English (US)</option>
  <option value="he"${lang==='he'?' selected':''}>עברית</option></select>`; }
function wireLang(el){ const s = el.querySelector('.lang'); if (s) s.onchange = (e)=> setLang(e.target.value); }
applyDir();

async function api(path, method='GET', body){
  const r = await fetch(path, { method, headers:{ 'content-type':'application/json', ...(token?{authorization:'Bearer '+token}:{}) }, body: body?JSON.stringify(body):undefined });
  // A 401 on the auth endpoints means "wrong credentials" — let the login form show it inline,
  // don't treat it as an expired session (which would wipe the form via logout()+render()).
  if (r.status === 401 && !/^\/api\/(login|register)\b/.test(path)){ logout(); throw new Error(t('Session expired — please log in.')); }
  if (!r.ok){ let e; try{ e=await r.json(); }catch{ e={error:r.statusText}; } throw new Error(e.error || ('HTTP '+r.status)); }
  return r.status === 204 ? null : r.json();
}
function logout(){ token=null; user=null; localStorage.removeItem('whaser_token'); localStorage.removeItem('whaser_user'); render(); }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Cadence units for scheduled triggers (singular/plural keys keep Hebrew agreement correct).
const TIMING_UNITS = [
  { v:'second', one:'second', many:'seconds' },
  { v:'minute', one:'minute', many:'minutes' },
  { v:'hour',   one:'hour',   many:'hours' },
  { v:'day',    one:'day',    many:'days' },
  { v:'week',   one:'week',   many:'weeks' },
];
function unitOf(u){ return TIMING_UNITS.find(x=>x.v===u) || TIMING_UNITS[1]; }
function cadenceText(value, unit){ const u=unitOf(unit); return value===1 ? tf('Runs every {0}', t(u.one)) : tf('Runs every {0} {1}', value, t(u.many)); }
function cadenceShort(value, unit){ const u=unitOf(unit); return tf('every {0} {1}', value, t(u.many)); }

// Themed confirmation pop-up. Returns Promise<boolean> — true on confirm, false on cancel
// (Cancel button, backdrop click, or Escape). Cancel is focused by default so a destructive
// action is never the accidental default. Open dialogs are tracked so a re-render (e.g. a
// concurrent 401 → logout → render) tears them down instead of leaving a stray overlay/listener.
const _openDialogs = new Set();
function confirmDialog({ title, message, confirmLabel, danger=false }){
  return new Promise(resolve=>{
    const backdrop=$('<div class="modal-backdrop"></div>');
    const card=$('<div class="card modal" role="dialog" aria-modal="true"></div>');
    card.innerHTML = `<h2 style="margin-bottom:8px">${esc(title)}</h2>
      <div class="muted" style="margin-bottom:16px">${esc(message)}</div>
      <div class="row" style="justify-content:flex-end">
        <button class="ghost" data-act="cancel">${esc(t('Cancel'))}</button>
        <button class="${danger?'danger':'primary'}" data-act="ok">${esc(confirmLabel || t('Confirm'))}</button></div>`;
    let done=false;
    const close=(val)=>{ if(done) return; done=true; _openDialogs.delete(close); document.removeEventListener('keydown', onKey); backdrop.remove(); resolve(val); };
    const onKey=(e)=>{ if(e.key==='Escape') close(false); };
    card.querySelector('[data-act=cancel]').onclick=()=>close(false);
    card.querySelector('[data-act=ok]').onclick=()=>close(true);
    backdrop.onclick=(e)=>{ if(e.target===backdrop) close(false); };
    document.addEventListener('keydown', onKey);
    _openDialogs.add(close);
    backdrop.appendChild(card); document.body.appendChild(backdrop);
    card.querySelector('[data-act=cancel]').focus();
  });
}

// AI "Add timed action" builder: a modal chat that designs the action, auto-builds the capabilities
// the agent needs (tools/skills/workflows), then creates a DISABLED trigger for review.
function openTriggerBuilder(agentId, agent){
  const backdrop=$('<div class="modal-backdrop"></div>');
  const card=$('<div class="card modal wide" role="dialog" aria-modal="true"></div>');
  card.innerHTML = `<h2 style="margin-bottom:6px">${t('Add timed action')}</h2>
    <div class="muted" style="margin-bottom:8px">${t('Describe what the agent should do on a schedule. Whaser builds any tools it needs, then proposes the trigger.')}</div>
    <div class="chat" id="tb-chat" style="height:260px"></div>
    <div class="composer"><input id="tb-msg" placeholder="${t('Tell me about your agent…')}"/><button class="primary" id="tb-send">${t('Send')}</button></div>
    <div id="tb-actions" style="margin-top:10px"></div>
    <div class="row" style="justify-content:flex-end;margin-top:10px"><button class="ghost" id="tb-close">${t('Cancel')}</button></div>`;
  let done=false, sessionId=null, sending=false, buildShown=false;
  const close=()=>{ if(done) return; done=true; _openDialogs.delete(close); document.removeEventListener('keydown', onKey); backdrop.remove(); };
  const onKey=(e)=>{ if(e.key==='Escape') close(); };
  document.addEventListener('keydown', onKey); _openDialogs.add(close);
  backdrop.onclick=(e)=>{ if(e.target===backdrop) close(); };
  backdrop.appendChild(card); document.body.appendChild(backdrop);
  const chat=card.querySelector('#tb-chat'), input=card.querySelector('#tb-msg'), sendBtn=card.querySelector('#tb-send'), actions=card.querySelector('#tb-actions');
  card.querySelector('#tb-close').onclick=close;
  const addBub=(who,text)=>{ const b=$(`<div class="bub ${who}"></div>`); b.textContent=text; chat.appendChild(b); chat.scrollTop=chat.scrollHeight; };
  const setBusy=(b)=>{ sending=b; input.disabled=b; sendBtn.disabled=b; };
  (async()=>{ try{ const s=await api('/api/agents/'+agentId+'/triggers/start','POST'); sessionId=s.sessionId; addBub('bot', s.greeting); input.focus(); }
    catch(e){ addBub('bot', tf('⚠ {0}', e.message)); } })();
  const send=async()=>{ const text=input.value.trim(); if(!text||sending||!sessionId) return; input.value=''; addBub('me',text); setBusy(true);
    const typing=$(`<div class="bub bot muted">${esc(t('typing…'))}</div>`); chat.appendChild(typing); chat.scrollTop=chat.scrollHeight;
    try{ const r=await api('/api/agents/'+agentId+'/triggers/message','POST',{ sessionId, text }); typing.remove(); addBub('bot', r.reply);
      if(r.readyToBuild||r.buildNow) showBuild();
      // The user explicitly asked to build (any language) → press "Build this action" for them.
      if(r.buildNow){ const b=actions.querySelector('button'); if(b && !b.disabled){ setBusy(false); propose(b); return; } } }
    catch(e){ typing.remove(); addBub('bot', tf('⚠ {0}', e.message)); }
    setBusy(false); input.focus(); };
  sendBtn.onclick=send; input.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });
  function showBuild(){ if(buildShown) return; buildShown=true;
    actions.innerHTML=''; const b=$(`<button class="primary">${t('Build this action')}</button>`); b.onclick=()=>propose(b); actions.appendChild(b); }
  async function propose(btn){ if(btn) btn.disabled=true;
    actions.innerHTML=''; const box=$(`<div class="card" style="margin-top:8px;border-color:var(--accent)"><span class="muted">${t('Designing this action…')}</span></div>`); actions.appendChild(box);
    try{ const r=await api('/api/agents/'+agentId+'/triggers/propose','POST',{ sessionId }); const plan=r.plan;
      const caps=(plan.extensions||[]).map(ext=>`<div style="margin:4px 0"><span class="pill">${ext.kind==='skill'?'🧩':(ext.kind==='workflow'?'🤖':'📎')} ${esc(ext.kind)}</span> <span class="muted" dir="auto">${esc(ext.summary||'')}</span></div>`).join('');
      const banner=(agent.listenChats||[]).length ? tf("⚠️ When a trigger fires, it sends a REAL WhatsApp message to this agent's {0} chat(s).", agent.listenChats.length) : t('⚠️ No chats selected — fired actions are logged only (no real messages sent).');
      box.innerHTML = `${caps?`<b>${t('New capabilities to add')}</b>${caps}<div style="height:6px"></div>`:''}
        <b>${t('This trigger')}</b>
        <div class="muted" dir="auto" style="margin:4px 0">${esc(plan.trigger.prompt)}</div>
        <div><span class="pill">⏰ ${esc(cadenceText(plan.trigger.value, plan.trigger.unit))}</span></div>
        <div class="card" style="border-color:var(--danger);margin:8px 0">${banner}</div>`;
      const ap=$(`<button class="primary">${t('Apply')}</button>`); ap.onclick=async()=>{ ap.disabled=true;
        try{ await api('/api/agents/'+agentId+'/triggers/apply','POST',{ sessionId });
          box.appendChild($(`<div class="ok" style="margin-top:8px">${t('Applied — trigger created (disabled). Turn it on with Active.')}</div>`));
          setTimeout(()=>{ close(); if(view==='agent:'+agentId) render(); }, 900); }
        catch(e){ box.appendChild($(`<div class="err" style="margin-top:8px">${esc(e.message)}</div>`)); ap.disabled=false; } };
      box.appendChild(ap);
    }catch(e){ box.innerHTML=`<div class="err">${esc(e.message)}</div>`; const rb=$(`<button class="primary" style="margin-top:8px">${t('Build this action')}</button>`); rb.onclick=()=>propose(rb); box.appendChild(rb); }
  }
}

function render(){
  if (waPollTimer){ clearInterval(waPollTimer); waPollTimer=null; }
  [..._openDialogs].forEach(close=>close(false)); // never let a modal outlive a re-render
  const root = document.getElementById('root');
  root.innerHTML = '';
  if (!token || !user){ root.appendChild(LoginView()); return; }
  root.appendChild(Header());
  const wrap = $('<div class="wrap"></div>');
  root.appendChild(wrap);
  if (billing.blocked){
    const ban=$(`<div class="card" style="border-color:var(--danger);background:rgba(241,92,109,.08)"><b>${t('⚠️ Your balance is empty — your agents have paused.')}</b><div class="muted" style="margin:4px 0 8px">${t('Your agents won\'t answer (on WhatsApp or here) until you add credit and go above $1.')}</div><button class="primary" id="ban-topup">${t('Add credit')}</button></div>`);
    wrap.appendChild(ban); ban.querySelector('#ban-topup').onclick=topUpDialog;
  }
  if (view === 'agents') AgentsView(wrap);
  else if (view === 'catalog') CatalogView(wrap);
  else if (view === 'create') CreateView(wrap);
  else if (view === 'whatsapp') WhatsAppView(wrap);
  else if (view === 'activity') ActivityView(wrap);
  else if (view && view.startsWith('agent:')) AgentDetailView(wrap, view.slice(6));
}

function Header(){
  const h = $('<header></header>');
  const items = [['agents',t('Agents')],['catalog',t('Catalog')],['create',t('+ Create agent')],['whatsapp',t('WhatsApp')],['activity',t('Activity')]];
  const cur = items.find(i=>i[0]===view) || ((view&&view.startsWith('agent:')) ? items[0] : items[0]);
  h.innerHTML = `<span class="logo">Whaser</span>
    <div class="menu">
      <button class="nav menubtn" id="menubtn" aria-haspopup="true">☰ ${esc(cur[1])} <span style="opacity:.6">▾</span></button>
      <div class="menu-panel" id="menupanel">
        ${items.map(([k,label])=>`<button class="menu-item ${view===k?'active':''}" data-go="${k}">${esc(label)}</button>`).join('')}
      </div>
    </div>
    <span class="spacer"></span>
    <button class="badge" id="balance" title="${t('Your AI balance. Agents pause at $0 and work again once you top up above $1.')}" style="cursor:pointer;${billing.blocked?'background:var(--danger);color:#2a0a0e;border-color:var(--danger);font-weight:700':''}">💰 $${(billing.balance||0).toFixed(2)}${billing.blocked?' ⚠':''}</button>
    ${langSelect()}
    <span class="badge ${mode==='claude'?'live':'paused'}" title="${mode==='claude'?t('Live Claude (ANTHROPIC_API_KEY set)'):t('Demo mode — set ANTHROPIC_API_KEY for real Claude')}">${mode==='claude'?t('● Claude'):t('● Demo')}</span>
    <span class="who">${esc(user.displayName)}</span>
    <button class="ghost" id="logout">${t('Log out')}</button>`;
  h.querySelectorAll('[data-go]').forEach(b=> b.onclick=()=>{ view=b.dataset.go; render(); });
  const menubtn=h.querySelector('#menubtn'), panel=h.querySelector('#menupanel');
  menubtn.onclick=(e)=>{ e.stopPropagation(); const open=panel.classList.toggle('open');
    if(open){ const close=(ev)=>{ if(!h.querySelector('.menu').contains(ev.target)){ panel.classList.remove('open'); document.removeEventListener('click', close); } };
      setTimeout(()=>document.addEventListener('click', close), 0); } };
  wireLang(h);
  h.querySelector('#balance').onclick = topUpDialog;
  h.querySelector('#logout').onclick = logout;
  return h;
}

// Demo top-up: add AI credit. (No real payment in this POC.)
async function topUpDialog(){
  const backdrop=$('<div class="modal-backdrop"></div>');
  const card=$('<div class="card modal"></div>');

  let data=billing, usage=[];

    : `<div class="muted" style="margin-top:16px;font-size:12.5px">${t('No AI usage recorded yet.')}</div>`;

  card.querySelectorAll('[data-amt]').forEach(b=> b.onclick=async()=>{ b.disabled=true;
    try{ const r=await api('/api/billing/topup','POST',{ amount:Number(b.dataset.amt) }); billing={balance:r.balance,blocked:r.blocked,resumeAbove:r.resumeAbove}; close(); render(); }

    }catch(err){ const el=card.querySelector('#e'); if(el) el.textContent = (!signup && /credential|401|unauthor/i.test(err.message)) ? t('Wrong username or password — please try again.') : err.message; } };

async function AgentsView(wrap){
  wrap.appendChild($(`<h1>${t('Agents')}</h1>`));
  wrap.appendChild($(`<div class="muted" style="margin-bottom:14px">${tf('Every agent your tenant ({0}) owns. Create one with the guided conversation.', esc(user.tenantName))}</div>`));
  try {
    const { agents } = await api('/api/agents');
    if (!agents.length){ wrap.appendChild($(`<div class="card muted">${t('No agents yet. Click <b>+ Create agent</b> to design one.')}</div>`)); return; }
    const grid = $('<div class="grid"></div>');
    for (const a of agents){
      const card = $('<div class="card" style="cursor:pointer"></div>');
      card.innerHTML = `<div class="row" style="justify-content:space-between"><b>${esc(a.name)}</b>
        <span class="badge ${a.status==='live'?'live':'paused'}">${t(a.status)}</span></div>
        <div class="muted" style="margin:6px 0">${esc(a.goal)}</div>
        <div><span class="pill">${esc(a.tone)}</span><span class="pill">${esc(a.model)}</span><span class="pill">📱 ${esc(a.phoneNumberId)}</span></div>
        <div class="muted" style="margin-top:8px;font-size:12.5px">${tf('Last activity: {0}', a.lastActivityAt? new Date(a.lastActivityAt).toLocaleString(locale()):'—')}</div>`;
      card.onclick = ()=>{ view='agent:'+a.id; render(); };
      grid.appendChild(card);
    }
    wrap.appendChild(grid);
  } catch(err){ wrap.appendChild($(`<div class="card err">${esc(err.message)}</div>`)); }
}

async function CatalogView(wrap){
  wrap.appendChild($(`<h1>${t('Catalog')}</h1>`));
  wrap.appendChild($(`<div class="muted" style="margin-bottom:14px">${t('Curated, ready-to-deploy agents — pick one to launch it on a number instantly.')}</div>`));
  try {
    const { catalog } = await api('/api/catalog');
    if (!catalog.length){ wrap.appendChild($(`<div class="card muted">${t('The catalog is empty.')}</div>`)); return; }
    const grid = $('<div class="grid"></div>');
    for (const c of catalog){
      const card = $('<div class="card"></div>');
      card.innerHTML = `<div class="row" style="justify-content:space-between"><b>${c.icon?esc(c.icon)+' ':''}${esc(c.title)}</b>
        <span class="pill">${esc(c.category)}</span></div>
        <div class="muted" style="margin:6px 0">${esc(c.description)}</div>
        <div><span class="pill">${esc(c.tone)}</span><span class="pill">${esc(c.model)}</span></div>
        <div class="row" style="margin-top:12px"><button class="primary" data-act="deploy">${t('Deploy')}</button>
        <button class="ghost" data-act="preview">${t('Preview spec')}</button></div>
        <pre data-spec style="display:none;margin-top:10px"></pre>`;
      const deployBtn = card.querySelector('[data-act=deploy]');
      deployBtn.onclick = async ()=>{ deployBtn.disabled=true;
        try{ const r = await api('/api/catalog/'+encodeURIComponent(c.id)+'/deploy','POST'); view='agent:'+r.agentId; render(); }
        catch(err){ deployBtn.disabled=false; alert(err.message); } };
      const prev = card.querySelector('[data-act=preview]'), pre = card.querySelector('[data-spec]');
      prev.onclick = async ()=>{ if (pre.style.display!=='none'){ pre.style.display='none'; return; }
        if (!pre.textContent){ try{ const d = await api('/api/catalog/'+encodeURIComponent(c.id)); pre.textContent = JSON.stringify(d.spec,null,2); }catch(err){ pre.textContent = err.message; } }
        pre.style.display='block'; };
      grid.appendChild(card);
    }
    wrap.appendChild(grid);
  } catch(err){ wrap.appendChild($(`<div class="card err">${esc(err.message)}</div>`)); }
}

async function AgentDetailView(wrap, id){
  wrap.appendChild($(`<button class="ghost" id="back">${t('← Agents')}</button>`));
  wrap.querySelector('#back').onclick=()=>{ view='agents'; render(); };
  let a;
  try { a = await api('/api/agents/'+id); } catch(err){ wrap.appendChild($(`<div class="card err">${esc(err.message)}</div>`)); return; }
  const head = $('<div class="card"></div>');
  head.innerHTML = `<div class="row" style="justify-content:space-between"><h2 style="margin:0">${esc(a.name)} <span class="muted" style="font-size:13px">v${a.version}</span></h2>
    <span class="badge ${a.status==='live'?'live':'paused'}">${t(a.status)}</span></div>
    <div class="muted">${esc(a.goal)}</div>
    ${a.spec.workflow.mode==='router'
      ? `<div style="margin-top:10px"><b>${t('Workflow:')}</b> ${tf('router → {0} sub-agents', a.spec.sub_agents.length)}
         <div style="margin-top:4px">${a.spec.workflow.routes.map(r=>`<span class="pill">🧭 ${esc(r.intent)} ${arrow()} ${esc(r.target)}</span>`).join('')}</div>
         <div style="margin-top:4px">${a.spec.sub_agents.map(s=>`<span class="pill">🤖 ${esc(s.name)}${s.tool_names.length?(' ['+s.tool_names.map(esc).join(', ')+']'):''}</span>`).join('')}</div></div>`
      : `<div style="margin-top:10px muted"><b>${t('Workflow:')}</b> <span class="muted">${t('single agent')}</span></div>`}
    ${(a.spec.skills&&a.spec.skills.length)?`<div style="margin-top:10px"><b>${t('Skills:')}</b> ${a.spec.skills.map(s=>`<span class="pill" title="${esc(s.description)}">🧩 ${esc(s.name)}</span>`).join('')}</div>`:''}
    <div style="margin-top:10px">${(a.listenChats&&a.listenChats.length)?(`<b>${t('Listening on:')}</b> `+a.listenChats.map(c=>`<span class="pill">💬 ${esc(c.name)}</span>`).join('')):`<span class="muted"><b>${t('Listening on:')}</b> ${t('no chats selected (chosen during creation)')}</span>`}</div>
    <div class="row" style="margin-top:12px"><button id="toggle">${a.status==='live'?t('Pause'):t('Resume')}</button>
    <button class="ghost" id="showspec">${t('View AgentSpec')}</button>
    <button id="editchats">${t('✏️ Edit chats')}</button>
    <button id="answerself" class="${a.answerSelf?'primary':''}" title="${t('When on, the agent also replies to messages YOU send from your connected WhatsApp.')}">${a.answerSelf?t('🙋 Answer my own messages: On'):t('🙋 Answer my own messages: Off')}</button>
    ${whatsapp.configured ? `<button id="connectwa" class="${whatsapp.boundAgentId===a.id?'':'primary'}">${whatsapp.boundAgentId===a.id?t('✓ Cloud API connected'):tf('📲 Connect Cloud API ({0})', esc(whatsapp.phoneNumberId))}</button>` : ''}
    <button class="danger" id="delete" style="margin-inline-start:auto">${t('🗑 Delete agent')}</button></div>
    <pre id="spec" style="display:none;margin-top:10px">${esc(JSON.stringify(a.spec,null,2))}</pre>
    <div id="chatedit"></div>`;
  head.querySelector('#toggle').onclick = async ()=>{ await api('/api/agents/'+id+'/'+(a.status==='live'?'pause':'resume'),'POST'); render(); };
  head.querySelector('#answerself').onclick = async ()=>{ try{ await api('/api/agents/'+id+'/answer-self','POST',{ enabled: !a.answerSelf }); render(); }catch(e){ alert(e.message); } };
  head.querySelector('#delete').onclick = async ()=>{
    const ok = await confirmDialog({ title:t('Delete agent?'), message:tf('"{0}" will be permanently removed, along with its number binding and any chats it listens on. This can\'t be undone.', a.name), confirmLabel:t('🗑 Delete agent'), danger:true });
    if(!ok) return;
    try{ await api('/api/agents/'+id,'DELETE'); if(whatsapp.boundAgentId===id) whatsapp.boundAgentId=null; view='agents'; render(); }
    catch(e){ alert(e.message); } };
  head.querySelector('#showspec').onclick = ()=>{ const p=head.querySelector('#spec'); p.style.display = p.style.display==='none'?'block':'none'; };
  head.querySelector('#editchats').onclick = ()=>{ const c=head.querySelector('#chatedit');
    if (c.dataset.open){ c.innerHTML=''; delete c.dataset.open; return; }
    c.dataset.open='1';
    buildChatPicker(c, a.listenChats||[], t('Save chats'), async (chats, btn)=>{ btn.disabled=true;
      try{ await api('/api/agents/'+id+'/chats','POST',{ chats }); render(); }
      catch(e){ alert(e.message); btn.disabled=false; } }); };
  const cw = head.querySelector('#connectwa');
  if (cw && whatsapp.boundAgentId!==a.id) cw.onclick = async ()=>{ cw.disabled=true;
    try{ const r=await api('/api/agents/'+id+'/connect-whatsapp','POST'); whatsapp.boundAgentId=r.boundAgentId; render(); }
    catch(e){ alert(e.message); cw.disabled=false; } };
  wrap.appendChild(head);

  // --- Section tabs: show one of Schedule / Simulator / Improve at a time (not one long page) ---
  const _panes = { schedule: $('<div class="tabpane"></div>'), simulator: $('<div class="tabpane"></div>'), improve: $('<div class="tabpane"></div>') };
  const _tabbar = $('<div class="tabs"></div>');
  _tabbar.innerHTML = [['schedule', t('Schedule')], ['simulator', t('Simulator')], ['improve', t('Improve')]].map(([k, l]) => `<button class="tab" data-tab="${k}">${esc(l)}</button>`).join('');
  const showTab = (k) => { agentTab = k; for (const key in _panes) _panes[key].style.display = key === k ? 'block' : 'none'; _tabbar.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === k)); };
  _tabbar.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => showTab(b.dataset.tab));
  wrap.appendChild(_tabbar);
  wrap.appendChild(_panes.schedule); wrap.appendChild(_panes.simulator); wrap.appendChild(_panes.improve);
  showTab(_panes[agentTab] ? agentTab : 'simulator');

  // ⏰ Scheduled triggers — actions the agent runs automatically on a cadence (fires + sends to its chats).
  {
    const chatCount = (a.listenChats||[]).length;
    const dangerBanner = chatCount
      ? tf("⚠️ When a trigger fires, it sends a REAL WhatsApp message to this agent's {0} chat(s).", chatCount)
      : t('⚠️ No chats selected — fired actions are logged only (no real messages sent).');
    const tcard = $('<div class="card"></div>');
    tcard.innerHTML = `<div class="row" style="justify-content:space-between"><h2 style="margin:0">${t('⏰ Scheduled triggers')}</h2>
        <button class="primary" id="addtrigger">${t('➕ Add timed action')}</button></div>
      <div class="muted" style="margin:6px 0">${t('Actions this agent runs on a schedule, all by itself.')}</div>
      <div class="card" style="border-color:var(--danger);margin:0 0 10px">${dangerBanner}</div>
      ${a.status==='paused'?`<div class="muted" style="margin-bottom:8px">${t('Agent is paused — triggers will not run while paused.')}</div>`:''}
      <div id="triglist"></div>`;
    const list = tcard.querySelector('#triglist');
    const triggers = a.triggers||[];
    if (!triggers.length) list.innerHTML = `<div class="muted">${t('No scheduled triggers yet. Use ➕ Add timed action to create one.')}</div>`;
    for (const trg of triggers){
      const row = $('<div style="border-top:1px solid var(--line);padding-top:10px;margin-top:10px"></div>');
      const badge = trg.lastStatus==='error' ? `<span class="badge paused">${t('Trigger error')}</span>` : (trg.enabled?`<span class="badge live">${t('Active')}</span>`:'');
      const lastRun = trg.lastRunAt
        ? tf('Last run: {0}{1}', new Date(trg.lastRunAt).toLocaleString(locale()), (trg.lastSentCount!=null?tf(' · sent to {0} chat(s)', trg.lastSentCount):''))
        : t('Last run: never');
      const errTail = (trg.lastStatus==='error'&&trg.lastError) ? (' · <span class="err">'+esc(tf('⚠ {0}', trg.lastError))+'</span>') : '';
      row.innerHTML = `<div class="row" style="justify-content:space-between">
          <label class="row" style="gap:6px;margin:0"><input type="checkbox" class="tg-on"${trg.enabled?' checked':''}/> <b dir="auto">${esc(trg.label)}</b></label>
          ${badge}</div>
        <div class="muted" style="margin-top:4px">${esc(cadenceText(trg.value, trg.unit))}</div>
        <div class="muted" dir="auto" style="font-size:12.5px;margin-top:4px">${esc(trg.prompt.slice(0,160))}</div>
        <div class="muted" dir="auto" style="font-size:12px;margin-top:4px">${esc(lastRun)}${errTail}</div>
        <div class="row" style="margin-top:8px"><button class="ghost tg-run">${t('▶ Run now')}</button>
          <button class="ghost tg-edit">${t('✏️ Edit')}</button>
          <button class="danger tg-del" style="margin-inline-start:auto">${t('🗑 Delete')}</button></div>
        <div class="tg-editbox"></div>`;
      const on=row.querySelector('.tg-on'), runB=row.querySelector('.tg-run'), editB=row.querySelector('.tg-edit'), delB=row.querySelector('.tg-del'), editBox=row.querySelector('.tg-editbox');
      on.onchange=async()=>{ const enabling=on.checked;
        if (enabling && a.status==='live' && chatCount){
          const ok=await confirmDialog({ title:t('Enable scheduled trigger?'), message:tf('This will message {0} chat(s) {1}. Real WhatsApp messages will be sent.', chatCount, cadenceShort(trg.value,trg.unit)), confirmLabel:t('Active'), danger:true });
          if(!ok){ on.checked=false; return; }
        }
        try{ await api('/api/agents/'+id+'/triggers/'+trg.id,'PATCH',{ enabled:enabling }); render(); }
        catch(e){ alert(e.message); on.checked=!enabling; } };
      runB.onclick=async()=>{ runB.disabled=true; try{ await api('/api/agents/'+id+'/triggers/'+trg.id+'/run','POST'); render(); }catch(e){ alert(e.message); runB.disabled=false; } };
      delB.onclick=async()=>{ const ok=await confirmDialog({ title:t('Delete trigger?'), message:t("This scheduled trigger will be removed. This can't be undone."), confirmLabel:t('🗑 Delete'), danger:true }); if(!ok) return;
        try{ await api('/api/agents/'+id+'/triggers/'+trg.id,'DELETE'); render(); }catch(e){ alert(e.message); } };
      editB.onclick=()=>{ if(editBox.dataset.open){ editBox.innerHTML=''; delete editBox.dataset.open; return; } editBox.dataset.open='1';
        editBox.innerHTML = `<div class="card" style="margin-top:8px">
          <label>${t('Edit trigger')}</label>
          <input class="te-label" value="${esc(trg.label)}"/>
          <textarea class="te-prompt" rows="2" style="margin-top:6px"></textarea>
          <div class="row" style="margin-top:6px"><span class="muted">${t('Runs every')}</span>
            <input class="te-val" type="number" min="1" max="9999" step="1" value="${esc(String(trg.value))}" style="width:74px"/>
            <select class="te-unit">${TIMING_UNITS.map(u=>`<option value="${u.v}"${u.v===trg.unit?' selected':''}>${esc(t(u.many))}</option>`).join('')}</select>
            <button class="primary te-save" style="margin-inline-start:auto">${t('Save trigger')}</button></div></div>`;
        editBox.querySelector('.te-prompt').value=trg.prompt;
        const sv=editBox.querySelector('.te-save');
        sv.onclick=async()=>{ sv.disabled=true;
          const body={ label:editBox.querySelector('.te-label').value, prompt:editBox.querySelector('.te-prompt').value, value:Number(editBox.querySelector('.te-val').value), unit:editBox.querySelector('.te-unit').value };
          try{ await api('/api/agents/'+id+'/triggers/'+trg.id,'PATCH',body); render(); }catch(e){ alert(e.message); sv.disabled=false; } }; };
      list.appendChild(row);
    }
    tcard.querySelector('#addtrigger').onclick=()=> openTriggerBuilder(id, a);
    _panes.schedule.appendChild(tcard);
  }

  // WhatsApp simulator
  const sim = $('<div class="card"></div>');
  sim.innerHTML = `<h2>${t('WhatsApp simulator')}</h2><div class="muted" style="margin-bottom:8px">${t('Sends a real inbound message through the gateway → resolver → cost/abuse breaker → agent runtime → reply. (LLM + WhatsApp transport are stubbed locally.)')}</div>
    <div class="chat" id="chat"></div>
    <div class="composer"><input id="msg" placeholder="${t('Message this agent…')}"/><button class="primary" id="send">${t('Send')}</button></div>`;
  _panes.simulator.appendChild(sim);
  const chat = sim.querySelector('#chat');
  const from = '+15550000001';
  const addBub = (who, text)=>{ const b=$(`<div class="bub ${who}"></div>`); b.textContent=text; chat.appendChild(b); chat.scrollTop=chat.scrollHeight; };
  const loadHist = async ()=>{ const {history}=await api('/api/sim/history?agentId='+encodeURIComponent(id)+'&from='+encodeURIComponent(from)); chat.innerHTML=''; history.forEach(m=>addBub(m.role==='user'?'me':'bot', m.content)); if(!history.length) addBub('bot',t('(no messages yet — say hi)')); };
  await loadHist();
  const refreshBalance = async ()=>{ try{ billing = await api('/api/billing'); const el=document.getElementById('balance'); if(el){ el.textContent='💰 $'+(billing.balance||0).toFixed(2)+(billing.blocked?' ⚠':''); if(billing.blocked) el.style.cssText='cursor:pointer;background:var(--danger);color:#2a0a0e;border-color:var(--danger);font-weight:700'; } }catch{} };
  const send = async ()=>{ const inp=sim.querySelector('#msg'); const text=inp.value.trim(); if(!text) return; inp.value=''; addBub('me',text);
    try{ const out = await api('/api/sim/send','POST',{ agentId:id, from, text });
      if(out.reply) addBub('bot', (out.routedTo && out.routedTo!=='default' ? tf('🧭 routed → {0}', out.routedTo)+'\n' : '') + out.reply);
      else if(out.blocked==='no_balance') addBub('bot', t('⚠️ Your balance is empty — add credit (tap 💰 at the top) to keep chatting.'));
      else addBub('bot', out.blocked?tf('(no reply: {0})', out.blocked):t('(no reply)'));
      refreshBalance(); }
    catch(err){ addBub('bot',tf('⚠ {0}', err.message)); } };
  sim.querySelector('#send').onclick = send;
  sim.querySelector('#msg').addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });

  // Improve this agent — a real chat that pauses the agent, applies approved changes, then resumes it.
  const imp = $('<div class="card"></div>');
  imp.innerHTML = `<h2>${t('Improve this agent')}</h2><div class="muted" style="margin-bottom:8px">${t('Open a chat to talk through and apply improvements. The agent is paused while you work, and goes live again when you finish.')}</div>
    <button class="primary" id="improve">${t('✨ Improve in a chat')}</button>`;
  _panes.improve.appendChild(imp);
  imp.querySelector('#improve').onclick = ()=> improveChat();

  function improveChat(){
    const backdrop=$('<div class="modal-backdrop"></div>');
    const card=$('<div class="card modal wide" role="dialog" aria-modal="true"></div>');
    card.innerHTML=`<div class="row" style="justify-content:space-between;align-items:center;margin-bottom:4px"><h2 style="margin:0">${t('Improve this agent')}</h2><button class="ghost" id="imp-expand" title="${t('Expand / shrink')}" style="font-size:18px;line-height:1;padding:4px 10px">⤢</button></div>
      <div class="card" style="border-color:var(--accent2);background:rgba(6,207,156,.08);padding:8px 10px;margin-bottom:8px"><b>⏸ ${t('Agent paused while you improve it')}</b> <span class="muted">${t('— it goes live again when you click Done.')}</span></div>
      <div class="chat" id="imp-chat" style="height:300px"></div>
      <div class="composer"><input id="imp-msg" placeholder="${t('What should we improve?')}" disabled/><button class="primary" id="imp-send" disabled>${t('Send')}</button></div>
      <div id="imp-actions" style="margin-top:10px"></div>
      <div class="row" style="justify-content:flex-end;margin-top:10px"><button class="primary" id="imp-done">${t('✓ Done (resume agent)')}</button></div>`;
    let done=false, sessionId=null, sending=false;
    const chat=card.querySelector('#imp-chat'), input=card.querySelector('#imp-msg'), sendBtn=card.querySelector('#imp-send'), actions=card.querySelector('#imp-actions');
    const addBub=(who,text)=>{ const b=$(`<div class="bub ${who}"></div>`); b.textContent=text; chat.appendChild(b); chat.scrollTop=chat.scrollHeight; };
    const finish=async(doRender)=>{ if(done) return; done=true; _openDialogs.delete(finish); document.removeEventListener('keydown', onKey);
      if(sessionId){ try{ await api('/api/agents/'+id+'/improve/finish','POST',{ sessionId }); }catch{} }
      backdrop.remove(); if(doRender!==false) render(); }; // resume the agent + refresh
    const confirmClose=async()=>{ if(await confirmDialog({ title:t('Close the improvement chat?'), message:t('Applied changes are saved. The rest of this conversation will be discarded, and the agent will resume.'), confirmLabel:t('Close chat') })) finish(); };
    const onKey=(e)=>{ if(e.key==='Escape') confirmClose(); };
    document.addEventListener('keydown', onKey); _openDialogs.add(finish);
    // Clicking outside the dialog does NOT close it — a mis-click must never discard the chat.
    card.querySelector('#imp-expand').onclick=()=> card.classList.toggle('modal-xl');
    card.querySelector('#imp-done').onclick=()=>finish();
    backdrop.appendChild(card); document.body.appendChild(backdrop);
    (async()=>{ try{ const s=await api('/api/agents/'+id+'/improve/start','POST'); sessionId=s.sessionId; addBub('bot', s.greeting); input.disabled=false; sendBtn.disabled=false; input.focus(); }
      catch(e){ addBub('bot', tf('⚠ {0}', e.message)); } })();
    const send=async()=>{ const text=input.value.trim(); if(!text||sending||!sessionId) return; input.value=''; addBub('me',text); sending=true; input.disabled=true; sendBtn.disabled=true;
      const typing=$(`<div class="bub bot muted">${esc(t('typing…'))}</div>`); chat.appendChild(typing); chat.scrollTop=chat.scrollHeight;
      try{ const r=await api('/api/agents/'+id+'/improve/message','POST',{ sessionId, text }); typing.remove(); addBub('bot', r.reply); if(r.proposal) showProposal(r.proposal); }
      catch(e){ typing.remove(); addBub('bot', tf('⚠ {0}', e.message)); }
      sending=false; input.disabled=false; sendBtn.disabled=false; input.focus(); };
    sendBtn.onclick=send; input.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });

    function showProposal(ext){
      actions.innerHTML='';
      const box=$('<div class="card" style="border-color:var(--accent)"></div>');
      box.innerHTML=`<b>${tf('Proposed change — {0}', esc(ext.kind))}</b><div class="muted" style="margin:4px 0">${esc(ext.summary||'')}</div><div id="pd"></div>`;
      box.querySelector('#pd').innerHTML=renderExtDetail(ext);
      const ap=$(`<button class="primary" style="margin-top:8px">${t('Apply this change')}</button>`);
      ap.onclick=async()=>{ ap.disabled=true;
        try{ const r=await api('/api/agents/'+id+'/improve/apply','POST',{ extension: ext });
          box.appendChild($(`<div class="ok" style="margin-top:8px">${tf('Applied — agent is now v{0}.', r.version)}</div>`));
          addBub('bot', t('Applied ✓ — anything else to improve, or click Done?')); ap.remove(); }
        catch(e){ box.appendChild($(`<div class="err" style="margin-top:8px">${esc(e.message)}</div>`)); ap.disabled=false; } };
      box.appendChild(ap); actions.appendChild(box);
    }
  }

  // --- Extend agent: Context / Skills / Workflows ---
  function renderExtDetail(ext){
    if(ext.kind==='context') return ext.knowledge.map(k=>`<div><span class="pill">📎 ${esc(k.label)} · ${esc(k.type)}</span></div><pre style="white-space:pre-wrap;max-height:160px;overflow:auto">${esc(k.content)}</pre>`).join('');
    if(ext.kind==='skill') return `<div><b>🧩 ${esc(ext.skill.name)}</b><div class="muted">${esc(ext.skill.description)}</div><pre style="white-space:pre-wrap;max-height:220px;overflow:auto">${esc(ext.skill.instructions)}</pre></div>`;
    if(ext.kind==='workflow') return `<div><b>🤖 ${esc(ext.subAgent.name)}</b> <span class="muted">(${esc(ext.subAgent.id)})</span><div class="muted">${esc(ext.subAgent.specialty)}</div>
      <div style="margin-top:4px"><span class="pill">🧭 ${esc(ext.route.intent)} ${arrow()} ${esc(ext.route.target)}</span> ${(ext.newTools||[]).map(t=>`<span class="pill">🔧 ${esc(t.name)}</span>`).join('')}</div></div>`;
    return '';
  }
  function showExtensionConfirm(container, ext, repropose){
    container.innerHTML='';
    const card=$('<div class="card" style="border-color:var(--accent)"></div>');
    card.innerHTML=`<h2>${tf('Confirm — {0}', esc(ext.kind))}</h2><div class="muted" style="margin-bottom:8px">${esc(ext.summary||'')}</div><div id="detail"></div>`;
    card.querySelector('#detail').innerHTML=renderExtDetail(ext);
    const confirm=$(`<button class="primary" style="margin-top:10px">${t('Confirm')}</button>`);
    confirm.onclick=async()=>{ confirm.disabled=true;
      try{ const r=await api('/api/agents/'+id+'/extend/apply','POST',{ extension: ext });
        card.appendChild($(`<div class="ok" style="margin-top:8px">${tf('Applied — agent is now v{0}. Reloading…', r.version)}</div>`)); setTimeout(()=>render(),800); }
      catch(e){ card.appendChild($(`<div class="err" style="margin-top:8px">${esc(e.message)}</div>`)); confirm.disabled=false; } };
    card.appendChild(confirm);
    if(repropose){
      const ask=$('<div style="margin-top:12px"></div>');
      ask.appendChild($(`<label>${t('Ask changes')}</label>`));
      const ta=$(`<textarea rows="2" placeholder="${t('e.g. shorten it / add a step about refunds / rename the sub-agent')}"></textarea>`); ask.appendChild(ta);
      const ab=$(`<button style="margin-top:6px">${t('Ask Changes')}</button>`);
      ab.onclick=async()=>{ const tx=ta.value.trim(); if(!tx)return; ab.disabled=true; card.querySelector('#detail').innerHTML=`<span class="muted">${t('Re-drafting…')}</span>`;
        try{ const next=await repropose(tx, ext); showExtensionConfirm(container, next, repropose); }
        catch(e){ card.querySelector('#detail').innerHTML='<span class="err">'+esc(e.message)+'</span>'; ab.disabled=false; } };
      ask.appendChild(ab); card.appendChild(ask);
    }
    container.appendChild(card);
  }

  const ext = $('<div class="card"></div>');
  ext.innerHTML=`<h2>${t('Extend agent')}</h2><div class="muted" style="margin-bottom:8px">${t('Add context, a skill, or a workflow. Each change is drafted → you review it → Confirm (the agent version bumps).')}</div>
    <div style="margin-bottom:12px"><b>${t('Add context')}</b>
      <textarea id="ctxdesc" rows="2" placeholder="${t('Describe context for Claude to add…')}"></textarea>
      <div class="row" style="margin-top:6px"><button id="ctxdraft">${t('Draft from description')}</button></div>
      <div class="row" style="margin-top:6px"><input type="file" id="ctxfile" accept=".txt,.md,.markdown,.csv,.json,.text" style="flex:1"/>
        <input id="ctxurl" placeholder="${t('https://… (fetch a page)')}" style="flex:1"/><button id="ctxurlbtn">${t('Add URL')}</button></div></div>
    <div style="margin-bottom:12px"><b>${t('Add skill')}</b> <span class="muted">${t('(Claude Agent Skill)')}</span>
      <textarea id="skilldesc" rows="2" placeholder="${t('What should the skill do, and when should it trigger?')}"></textarea>
      <button id="skilldraft" style="margin-top:6px">${t('Draft skill')}</button></div>
    <div style="margin-bottom:4px"><b>${t('Add workflow')}</b> <span class="muted">${t('(router sub-agent)')}</span>
      <textarea id="wfdesc" rows="2" placeholder="${t('Describe a new task area / sub-agent…')}"></textarea>
      <button id="wfdraft" style="margin-top:6px">${t('Draft workflow')}</button></div>
    <div id="extout" style="margin-top:10px"></div>`;
  _panes.improve.appendChild(ext);
  const out = ext.querySelector('#extout');
  const proposeFor = (kind)=> (instruction, prior)=> api('/api/agents/'+id+'/extend/propose','POST',{ kind, instruction, prior: prior||null }).then(r=>r.extension);
  async function draft(kind, text){ if(!text.trim()) return; out.innerHTML=`<span class="muted">${t('Drafting…')}</span>`;
    try{ const e=await proposeFor(kind)(text, null); showExtensionConfirm(out, e, proposeFor(kind)); }
    catch(err){ out.innerHTML='<span class="err">'+esc(err.message)+'</span>'; } }
  ext.querySelector('#ctxdraft').onclick=()=>draft('context', ext.querySelector('#ctxdesc').value);
  ext.querySelector('#skilldraft').onclick=()=>draft('skill', ext.querySelector('#skilldesc').value);
  ext.querySelector('#wfdraft').onclick=()=>draft('workflow', ext.querySelector('#wfdesc').value);
  ext.querySelector('#ctxurlbtn').onclick=async()=>{ const u=ext.querySelector('#ctxurl').value.trim(); if(!u)return; out.innerHTML=`<span class="muted">${t('Fetching…')}</span>`;
    try{ const r=await api('/api/agents/'+id+'/extend/context-url','POST',{ url:u }); showExtensionConfirm(out, r.extension, proposeFor('context')); }
    catch(err){ out.innerHTML='<span class="err">'+esc(err.message)+'</span>'; } };
  ext.querySelector('#ctxfile').onchange=(e)=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
    rd.onload=async()=>{ out.innerHTML=`<span class="muted">${tf('Reading "{0}"…', esc(f.name))}</span>`;
      try{ const r=await api('/api/agents/'+id+'/extend/context-file','POST',{ label:f.name, text:String(rd.result||'').slice(0,12000) }); showExtensionConfirm(out, r.extension, proposeFor('context')); }
      catch(err){ out.innerHTML='<span class="err">'+esc(err.message)+'</span>'; } };
    rd.readAsText(f); };
}

async function WhatsAppView(wrap){
  wrap.appendChild($(`<h1>${t('WhatsApp — link your number (QR)')}</h1>`));
  wrap.appendChild($(`<div class="card" style="border-color:#8a6d3b">${t('⚠️ <b>POC only.</b> This links your <i>personal</i> WhatsApp via the unofficial WhatsApp-Web protocol — against WhatsApp\'s ToS, with a real risk of the number being banned. Prefer a spare SIM. The Cloud API path is the production-safe option.')}</div>`));
  const card = $('<div class="card"></div>');
  wrap.appendChild(card);
  async function refresh(){
    let s; try { s = await api('/api/wa/status'); } catch(e){ card.innerHTML = '<span class="err">'+esc(e.message)+'</span>'; return; }
    if (s.status === 'connected'){
      card.innerHTML = `<div class="ok" style="font-size:16px">${s.me?tf('✓ Linked as +{0}', esc(s.me)):t('✓ Linked')}</div>
        <div class="muted" style="margin-top:8px">${t('Each agent replies only in the chats picked during its creation. Use <b>+ Create agent</b> and select its chats.')}</div>
        <div class="muted" style="margin-top:6px">${tf('Then message <b>+{0}</b> from a selected chat — the agent (WAT + Claude) replies; unselected chats are ignored.', esc(s.me||t('your number')))}</div>`;
      if (waPollTimer){ clearInterval(waPollTimer); waPollTimer=null; }
    } else if (s.status === 'qr' && s.qrDataUrl){
      card.innerHTML = `<div>${t('On your phone: <b>WhatsApp → Settings → Linked devices → Link a device</b>, then scan this code:')}</div>
        <img alt="${t('WhatsApp QR')}" src="${s.qrDataUrl}" style="width:264px;height:264px;background:#fff;border-radius:8px;margin-top:12px"/>
        <div class="muted" style="margin-top:8px">${t('Waiting for the scan… (the code refreshes automatically)')}</div>`;
    } else if (s.status === 'connecting'){
      card.innerHTML = `<span class="muted">${t('Connecting to WhatsApp… generating QR…')}</span>`;
    } else {
      card.innerHTML = '';
      const b = $(`<button class="primary">${t('Link my WhatsApp')}</button>`);
      b.onclick = async ()=>{ b.disabled=true; try{ await api('/api/wa/link','POST'); refresh(); }catch(e){ card.innerHTML='<span class="err">'+esc(e.message)+'</span>'; } };
      card.appendChild(b);
    }
  }
  await refresh();
  waPollTimer = setInterval(refresh, 2500);
}

async function ActivityView(wrap){
  wrap.appendChild($(`<h1>${t('Activity')}</h1>`));
  wrap.appendChild($(`<div class="muted" style="margin-bottom:14px">${t('Live feed of inbound → routing → reply across your tenant\'s agents (simulator 🧪 + WhatsApp 📱). Newest first, refreshes automatically.')}</div>`));
  const card=$('<div class="card"></div>'); wrap.appendChild(card);
  async function refresh(){
    let r; try{ r=await api('/api/activity'); }catch(e){ card.innerHTML='<span class="err">'+esc(e.message)+'</span>'; return; }
    if(!r.events.length){ card.innerHTML=`<span class="muted">${t('No activity yet. Use an agent\'s simulator, or message a linked chat.')}</span>`; return; }
    card.innerHTML = r.events.map(e=>{
      const when=new Date(e.ts).toLocaleTimeString(locale());
      const ch = e.channel==='whatsapp'?'📱':(e.channel==='timer'?'⏰':'🧪');
      const route = e.blocked ? '<span class="err">⛔ '+esc(e.blocked)+'</span>' : (e.routedTo && e.routedTo!=='default' ? '🧭 '+esc(e.routedTo) : `<span class="muted">${t('default')}</span>`);
      const reply = e.reply ? esc(e.reply.slice(0,200)) : `<span class="muted">${t('(no reply)')}</span>`;
      return `<div style="border-bottom:1px solid var(--line);padding:8px 0">
        <div class="muted" style="font-size:12px">${when} · ${ch} <b>${esc(e.agentName)}</b> · ${tf('from {0}', esc(e.from))}${e.chatId?(' · '+esc(String(e.chatId).split('@')[0])):''} · ${route}</div>
        <div style="margin-top:2px">“${esc(e.text.slice(0,200))}”</div>
        <div style="margin-top:2px">↳ ${reply}</div></div>`;
    }).join('');
  }
  await refresh();
  waPollTimer = setInterval(refresh, 3000);
}

// Reusable chat allow-list picker (used by the wizard and by "Edit chats"). Renders into
// `container`; calls onSave(chats, saveBtn) when the user confirms. Falls back to a link prompt
// when WhatsApp isn't connected.
// --- WhatsApp avatar helpers: initials fallback rendered instantly, photo swapped in lazily ---
const _waPhotoCache = new Map(); // jid -> Promise<string|null> (dedupes in-flight + caches result)
// Throttle photo fetches to a few at a time so 100 avatars never saturate the browser's
// ~6-connection-per-host pool (which would stall navigation/other requests).
let _waInflight = 0; const _waQ = [];
function _waPump(){ while(_waInflight < 5 && _waQ.length){ const it=_waQ.shift(); _waInflight++;
  api('/api/wa/photo?jid='+encodeURIComponent(it.jid)).then(r=>(r&&r.url)||null).catch(()=>null).then(u=>{ _waInflight--; it.res(u); _waPump(); }); } }
function waPhoto(jid){ if(!_waPhotoCache.has(jid)){ _waPhotoCache.set(jid, new Promise(res=>{ _waQ.push({jid,res}); _waPump(); })); } return _waPhotoCache.get(jid); }
function waInitials(name){ const s=String(name||'').trim(); if(!s) return '?'; const p=s.split(/\s+/); return ((p[0][0]||'')+(p.length>1?(p[p.length-1][0]||''):'')).toUpperCase(); }
function avatarEl(c, size){ size=size||32; const a=$('<span class="wa-av"></span>'); a.style.width=a.style.height=size+'px'; a.style.lineHeight=size+'px'; a.style.fontSize=Math.round(size*0.4)+'px'; a.textContent=waInitials(c.name); a.title=c.name;
  if(c.isGroup) a.classList.add('grp');
  waPhoto(c.id).then(url=>{ if(!url) return; const img=new Image(); img.onload=()=>{ a.textContent=''; a.style.backgroundImage='url("'+url+'")'; a.classList.add('img'); }; img.src=url; });
  return a; }

async function buildChatPicker(container, preselected, saveLabel, onSave){
  container.innerHTML='';
  const box=$('<div class="card" style="margin-top:8px"></div>'); container.appendChild(box);
  let st; try{ st=await api('/api/wa/status'); }catch{ st={status:'disconnected'}; }
  if (st.status!=='connected'){
    box.innerHTML=`<div class="muted">${t('Your WhatsApp isn\'t linked yet — link it to choose chats.')}</div>`;
    const lb=$(`<button class="primary" style="margin-top:8px">${t('Link my WhatsApp')}</button>`);
    lb.onclick=async()=>{ lb.disabled=true; try{ await api('/api/wa/link','POST'); }catch{}
      const poll=setInterval(async()=>{ let s; try{ s=await api('/api/wa/status'); }catch{ return; }
        if(s.status==='qr'&&s.qrDataUrl){ box.innerHTML=`<div>${t('Scan in WhatsApp → Settings → Linked devices → Link a device:')}</div><img alt="${t('WhatsApp QR')}" src="`+s.qrDataUrl+'" style="width:240px;height:240px;background:#fff;border-radius:8px;margin-top:8px"/>'; }
        if(s.status==='connected'){ clearInterval(poll); buildChatPicker(container, preselected, saveLabel, onSave); } }, 2500); };
    box.appendChild(lb); return;
  }
  const selected=new Map((preselected||[]).map(c=>[c.id,{id:c.id,name:c.name,isGroup:String(c.id).endsWith('@g.us')}]));
  box.innerHTML=`<b>${t('Which chats should this agent answer?')}</b><div class="muted" style="margin:4px 0 8px">${t('Search your contacts and groups by name or number, then tick the ones to listen on.')}</div>`;
  const search=$(`<input placeholder="${t('Search chats/contacts…')}"/>`); box.appendChild(search);
  const chips=$('<div style="margin:8px 0"></div>'); box.appendChild(chips);
  const results=$('<div style="max-height:240px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:6px;margin-top:6px"></div>'); box.appendChild(results);
  const save=$('<button class="primary" style="margin-top:10px" disabled></button>'); save.textContent=saveLabel; box.appendChild(save);
  function renderChips(){ chips.innerHTML='';
    if(!selected.size){ chips.appendChild($(`<span class="muted">${t('none selected yet')}</span>`)); save.disabled=true; return; }
    [...selected.values()].forEach(c=>{ const pill=$('<span class="pill" style="display:inline-flex;align-items:center;gap:5px;margin:2px"></span>');
      pill.appendChild(avatarEl(c,18)); const tn=$('<span dir="auto"></span>'); tn.textContent=c.name; pill.appendChild(tn);
      if(c.isGroup) pill.appendChild($('<span>👥</span>')); chips.appendChild(pill); });
    save.disabled=false; }
  async function doSearch(){ let r; try{ r=await api('/api/wa/chats?q='+encodeURIComponent(search.value.trim())); }catch{ r={chats:[]}; }
    results.innerHTML = r.chats.length ? '' : `<span class="muted">${t('No matches (try a name or number; chats appear after they sync).')}</span>`;
    r.chats.forEach(c=>{ const row=$('<label class="chatrow"></label>');
      const cb=$('<input type="checkbox"/>'); cb.checked=selected.has(c.id);
      const name=$('<span dir="auto" class="chatname"></span>'); name.textContent=c.name||c.id.split('@')[0].split(':')[0];
      const badge=$(`<span class="chatbadge" title="${c.isGroup?t('Group'):''}">${c.isGroup?'👥':''}</span>`);
      row.appendChild(cb); row.appendChild(avatarEl(c,34)); row.appendChild(name); row.appendChild(badge);
      cb.onchange=(e)=>{ if(e.target.checked) selected.set(c.id,{id:c.id,name:c.name,isGroup:c.isGroup}); else selected.delete(c.id); renderChips(); };
      results.appendChild(row); }); }
  let tm; search.addEventListener('input', ()=>{ clearTimeout(tm); tm=setTimeout(doSearch, 300); });
  save.onclick=()=> onSave([...selected.values()].map(c=>({id:c.id,name:c.name})), save);
  renderChips(); doSearch();
}

async function CreateView(wrap){
  wrap.appendChild($(`<h1>${t('Create a new agent')}</h1>`));
  wrap.appendChild($(`<div class="muted" style="margin-bottom:12px">${t('Chat with Whaser to design your agent — describe what you want and the capabilities it needs (web search, webhooks, scheduled messages…). Whaser asks follow-ups, then builds the full agent from the conversation.')}</div>`));
  const card = $('<div class="card"></div>');
  card.innerHTML = `<div class="chat" id="chat"></div>
    <div class="composer"><input id="msg" placeholder="${t('Tell me about your agent…')}" disabled/><button class="primary" id="send" disabled>${t('Send')}</button></div>
    <div id="actions" style="margin-top:12px"></div>`;
  wrap.appendChild(card);
  const chat=card.querySelector('#chat'), input=card.querySelector('#msg'), sendBtn=card.querySelector('#send'), actions=card.querySelector('#actions');
  const addBub=(who,text)=>{ const b=$(`<div class="bub ${who}"></div>`); b.textContent=text; chat.appendChild(b); chat.scrollTop=chat.scrollHeight; };
  let sessionId=null, sending=false, buildShown=false, resultBox=null;
  const setBusy=(b)=>{ sending=b; input.disabled=b; sendBtn.disabled=b; };

  try {
    const s = await api('/api/wizard/start','POST');
    sessionId=s.sessionId; addBub('bot', s.greeting);
    input.disabled=false; sendBtn.disabled=false; input.focus();
  } catch(err){ addBub('bot',tf('⚠ {0}', err.message)); return; }

  const send = async ()=>{ const text=input.value.trim(); if(!text || sending) return; input.value=''; addBub('me',text); setBusy(true);
    const typing=$(`<div class="bub bot muted">${esc(t('typing…'))}</div>`); chat.appendChild(typing); chat.scrollTop=chat.scrollHeight;
    try{ const r = await api('/api/wizard/message','POST',{ sessionId, text });
      typing.remove(); addBub('bot', r.reply);
      if (r.readyToBuild || r.buildNow) showBuildButton();
      // The user explicitly asked to build (any language) → press "Build the agent" for them.
      if (r.buildNow){ const b=actions.querySelector('button'); if (b && !b.disabled){ setBusy(false); buildAgent(b); return; } }
    }catch(err){ typing.remove(); addBub('bot',tf('⚠ {0}', err.message)); }
    setBusy(false); input.focus();
  };
  sendBtn.onclick = send;
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });

  function showBuildButton(){
    if (buildShown) return; buildShown=true;
    actions.innerHTML='';
    actions.appendChild($(`<div class="muted" style="margin-bottom:6px">${t('I have enough to design your agent — or keep chatting to refine.')}</div>`));
    const b=$(`<button class="primary">${t('Build the agent')}</button>`);
    b.onclick = ()=> buildAgent(b);
    actions.appendChild(b);
  }

  async function buildAgent(btn){
    btn.disabled=true;
    if (resultBox) resultBox.remove();
    resultBox=$(`<div class="card" style="margin-top:8px"><span class="muted">${t('Designing your agent…')}</span></div>`);
    actions.appendChild(resultBox); const box=resultBox;
    try{
      const r = await api('/api/wizard/finalize','POST',{ sessionId });
      const status = r.publishable ? `<span class="ok">${t('✓ valid & consistent — ready to publish')}</span>`
        : `<span class="err">${t('needs attention')}</span>`;
      box.innerHTML = `<h2>${t('Generated AgentSpec')}</h2><div style="margin-bottom:8px">${status}</div>
        ${r.schemaErrors.length?`<div class="err">${tf('Schema: {0}', r.schemaErrors.map(esc).join('; '))}</div>`:''}
        ${r.issues.length?`<div class="err">${tf('Consistency: {0}', r.issues.map(i=>esc(i.message)).join('; '))}</div>`:''}
        <pre>${esc(JSON.stringify(r.spec,null,2))}</pre>`;
      if (r.publishable){
        setBusy(true); // design is done — lock the chat while picking chats + publishing
        box.appendChild($(`<div class="muted" style="margin-top:8px">${t('Choose which WhatsApp chats this agent should answer, then publish.')}</div>`));
        const pick=$('<div></div>'); box.appendChild(pick);
        buildChatPicker(pick, [], t('Publish & bind a number'), async (chats, saveBtn)=>{ saveBtn.disabled=true;
          try{ await api('/api/wizard/select-chats','POST',{ sessionId, chats });
            const pub=await api('/api/wizard/publish','POST',{ sessionId });
            box.appendChild($(`<div class="ok" style="margin-top:10px">${tf('Published as {0} on {1}. Opening…', esc(pub.agentId), esc(pub.phoneNumberId))}</div>`));
            setTimeout(()=>{ view='agent:'+pub.agentId; render(); }, 700);
          }catch(e){ alert(e.message); saveBtn.disabled=false; } });
      } else {
        btn.disabled=false; // let the user refine in chat and rebuild
      }
    }catch(err){ box.innerHTML=`<div class="err">${esc(err.message)}</div>`; btn.disabled=false; }
  }
}

(async function init(){ if (token){ try{ const d=await api('/api/me'); user=d.user; mode=d.mode||'stub'; whatsapp=d.whatsapp||whatsapp; billing=d.billing||billing; }catch{} } render(); })();
