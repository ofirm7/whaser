<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whaser — AI WhatsApp agent builder</title>
<style>
  :root { --bg:#0b141a; --panel:#111b21; --panel2:#202c33; --line:#2a3942; --text:#e9edef; --muted:#8696a0; --accent:#00a884; --accent2:#06cf9c; --danger:#f15c6d; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
  a { color:var(--accent2); }
  header { display:flex; align-items:center; gap:16px; padding:12px 18px; background:var(--panel); border-bottom:1px solid var(--line); }
  header .logo { font-weight:700; color:var(--accent2); font-size:18px; }
  header nav { display:flex; gap:6px; margin-left:8px; }
  header .spacer { flex:1; }
  header .who { color:var(--muted); font-size:13px; }
  button { font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--panel2); color:var(--text); padding:8px 14px; border-radius:8px; }
  button.primary { background:var(--accent); border-color:var(--accent); color:#04231c; font-weight:600; }
  button.ghost { background:transparent; }
  button.nav { background:transparent; border-color:transparent; color:var(--muted); }
  button.nav.active { color:var(--text); background:var(--panel2); }
  button:disabled { opacity:.5; cursor:default; }
  input, textarea { font:inherit; background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:10px 12px; width:100%; }
  .wrap { max-width:880px; margin:0 auto; padding:22px 18px 60px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .row { display:flex; gap:12px; align-items:center; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
  .muted { color:var(--muted); }
  .badge { font-size:12px; padding:2px 9px; border-radius:999px; border:1px solid var(--line); }
  .badge.live { color:#04231c; background:var(--accent2); border-color:var(--accent2); }
  .badge.paused { color:var(--muted); }
  h1 { font-size:22px; margin:0 0 4px; } h2 { font-size:17px; margin:0 0 10px; }
  .chat { background:#0b141a; border:1px solid var(--line); border-radius:12px; padding:14px; height:360px; overflow:auto; display:flex; flex-direction:column; gap:8px; }
  .bub { max-width:78%; padding:8px 11px; border-radius:10px; white-space:pre-wrap; }
  .bub.bot { align-self:flex-start; background:var(--panel2); }
  .bub.me { align-self:flex-end; background:#005c4b; }
  .composer { display:flex; gap:8px; margin-top:10px; }
  pre { background:#0b141a; border:1px solid var(--line); border-radius:8px; padding:12px; overflow:auto; font-size:12.5px; }
  .err { color:var(--danger); }
  .ok { color:var(--accent2); }
  .center { min-height:70vh; display:flex; align-items:center; justify-content:center; }
  .login { width:340px; }
  label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  .pill { display:inline-block; font-size:12px; background:var(--panel2); border:1px solid var(--line); border-radius:999px; padding:2px 9px; margin:2px 4px 2px 0; }
  .wa-av { display:inline-block; border-radius:50%; background:#3b4a54; color:#e9edef; text-align:center; vertical-align:middle; font-weight:600; background-size:cover; background-position:center; overflow:hidden; flex:0 0 auto; }
  .wa-av.grp { background:#1f5132; color:#d7f5e3; }
  .wa-av.img { background-color:transparent; color:transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const $ = (h) => { const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstChild; };
let token = localStorage.getItem('whaser_token');
let user = JSON.parse(localStorage.getItem('whaser_user') || 'null');
let mode = 'stub';
let whatsapp = { configured:false, phoneNumberId:null, boundAgentId:null };
let waPollTimer = null;
let view = 'agents';

async function api(path, method='GET', body){
  const r = await fetch(path, { method, headers:{ 'content-type':'application/json', ...(token?{authorization:'Bearer '+token}:{}) }, body: body?JSON.stringify(body):undefined });
  if (r.status === 401){ logout(); throw new Error('Session expired — please log in.'); }
  if (!r.ok){ let e; try{ e=await r.json(); }catch{ e={error:r.statusText}; } throw new Error(e.error || ('HTTP '+r.status)); }
  return r.status === 204 ? null : r.json();
}
function logout(){ token=null; user=null; localStorage.removeItem('whaser_token'); localStorage.removeItem('whaser_user'); render(); }
function esc(s){ return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function render(){
  if (waPollTimer){ clearInterval(waPollTimer); waPollTimer=null; }
  const root = document.getElementById('root');
  root.innerHTML = '';
  if (!token || !user){ root.appendChild(LoginView()); return; }
  root.appendChild(Header());
  const wrap = $('<div class="wrap"></div>');
  root.appendChild(wrap);
  if (view === 'agents') AgentsView(wrap);
  else if (view === 'catalog') CatalogView(wrap);
  else if (view === 'create') CreateView(wrap);
  else if (view === 'whatsapp') WhatsAppView(wrap);
  else if (view === 'activity') ActivityView(wrap);
  else if (view && view.startsWith('agent:')) AgentDetailView(wrap, view.slice(6));
}

function Header(){
  const h = $('<header></header>');
  h.innerHTML = `<span class="logo">Whaser</span>
    <nav>
      <button class="nav ${view==='agents'?'active':''}" data-go="agents">Agents</button>
      <button class="nav ${view==='catalog'?'active':''}" data-go="catalog">Catalog</button>
      <button class="nav ${view==='create'?'active':''}" data-go="create">+ Create agent</button>
      <button class="nav ${view==='whatsapp'?'active':''}" data-go="whatsapp">WhatsApp</button>
      <button class="nav ${view==='activity'?'active':''}" data-go="activity">Activity</button>
    </nav>
    <span class="spacer"></span>
    <span class="badge ${mode==='claude'?'live':'paused'}" title="${mode==='claude'?'Live Claude (ANTHROPIC_API_KEY set)':'Demo mode — set ANTHROPIC_API_KEY for real Claude'}">${mode==='claude'?'● Claude':'● Demo'}</span>
    <span class="who">${esc(user.displayName)} · ${esc(user.tenantName)} · ${esc(user.role)}</span>
    <button class="ghost" id="logout">Log out</button>`;
  h.querySelectorAll('[data-go]').forEach(b=> b.onclick=()=>{ view=b.dataset.go; render(); });
  h.querySelector('#logout').onclick = logout;
  return h;
}

function LoginView(){
  const c = $('<div class="center"></div>');
  const card = $('<div class="card login"></div>');
  card.innerHTML = `<h1>Whaser</h1><div class="muted" style="margin-bottom:8px">AI-driven WhatsApp agent builder</div>
    <label>Username</label><input id="u" value="alice" autocomplete="username"/>
    <label>Password</label><input id="p" type="password" value="password" autocomplete="current-password"/>
    <div style="margin-top:14px" class="row"><button class="primary" id="go">Sign in</button>
    <span class="muted">via directory (LDAP-like)</span></div>
    <div class="err" id="e" style="margin-top:10px"></div>
    <div class="muted" style="margin-top:14px;font-size:12.5px">Try: alice / bob (Acme) · carol (Globex) — password: <code>password</code></div>`;
  const submit = async ()=>{ try{
    const d = await api('/api/login','POST',{ username:card.querySelector('#u').value, password:card.querySelector('#p').value });
    token=d.token; user=d.user; mode=d.mode||'stub'; whatsapp=d.whatsapp||whatsapp; localStorage.setItem('whaser_token',token); localStorage.setItem('whaser_user',JSON.stringify(user)); view='agents'; render();
  }catch(err){ card.querySelector('#e').textContent = err.message; } };
  card.querySelector('#go').onclick = submit;
  card.querySelectorAll('input').forEach(i=> i.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); }));
  c.appendChild(card); return c;
}

async function AgentsView(wrap){
  wrap.appendChild($('<h1>Agents</h1>'));
  wrap.appendChild($(`<div class="muted" style="margin-bottom:14px">Every agent your tenant (${esc(user.tenantName)}) owns. Create one with the guided conversation.</div>`));
  try {
    const { agents } = await api('/api/agents');
    if (!agents.length){ wrap.appendChild($('<div class="card muted">No agents yet. Click <b>+ Create agent</b> to design one.</div>')); return; }
    const grid = $('<div class="grid"></div>');
    for (const a of agents){
      const card = $('<div class="card" style="cursor:pointer"></div>');
      card.innerHTML = `<div class="row" style="justify-content:space-between"><b>${esc(a.name)}</b>
        <span class="badge ${a.status==='live'?'live':'paused'}">${a.status}</span></div>
        <div class="muted" style="margin:6px 0">${esc(a.goal)}</div>
        <div><span class="pill">${esc(a.tone)}</span><span class="pill">${esc(a.model)}</span><span class="pill">📱 ${esc(a.phoneNumberId)}</span></div>
        <div class="muted" style="margin-top:8px;font-size:12.5px">Last activity: ${a.lastActivityAt? new Date(a.lastActivityAt).toLocaleString():'—'}</div>`;
      card.onclick = ()=>{ view='agent:'+a.id; render(); };
      grid.appendChild(card);
    }
    wrap.appendChild(grid);
  } catch(err){ wrap.appendChild($(`<div class="card err">${esc(err.message)}</div>`)); }
}

async function CatalogView(wrap){
  wrap.appendChild($('<h1>Catalog</h1>'));
  wrap.appendChild($('<div class="muted" style="margin-bottom:14px">Curated, ready-to-deploy agents — pick one to launch it on a number instantly.</div>'));
  try {
    const { catalog } = await api('/api/catalog');
    if (!catalog.length){ wrap.appendChild($('<div class="card muted">The catalog is empty.</div>')); return; }
    const grid = $('<div class="grid"></div>');
    for (const c of catalog){
      const card = $('<div class="card"></div>');
      card.innerHTML = `<div class="row" style="justify-content:space-between"><b>${c.icon?esc(c.icon)+' ':''}${esc(c.title)}</b>
        <span class="pill">${esc(c.category)}</span></div>
        <div class="muted" style="margin:6px 0">${esc(c.description)}</div>
        <div><span class="pill">${esc(c.tone)}</span><span class="pill">${esc(c.model)}</span></div>
        <div class="row" style="margin-top:12px"><button class="primary" data-act="deploy">Deploy</button>
        <button class="ghost" data-act="preview">Preview spec</button></div>
        <pre data-spec style="display:none;margin-top:10px"></pre>`;
      const deployBtn = card.querySelector('[data-act=deploy]');
      deployBtn.onclick = async ()=>{ deployBtn.disabled=true;
        try{ const r = await api('/api/catalog/'+encodeURIComponent(c.id)+'/deploy','POST'); view='agent:'+r.agentId; render(); }
        catch(err){ deployBtn.disabled=false; alert(err.message); } };
      const prev = card.querySelector('[data-act=preview]'), pre = card.querySelector('[data-spec]');
      prev.onclick = async ()=>{ if (pre.style.display!=='none'){ pre.style.display='none'; return; }
        if (!pre.textContent){ try{ const d = await api('/api/catalog/'+encodeURIComponent(c.id)); pre.textContent = JSON.stringify(d.spec,null,2); }catch(err){ pre.textContent = err.message; } }
        pre.style.display='block'; };
      grid.appendChild(card);
    }
    wrap.appendChild(grid);
  } catch(err){ wrap.appendChild($(`<div class="card err">${esc(err.message)}</div>`)); }
}

async function AgentDetailView(wrap, id){
  wrap.appendChild($('<button class="ghost" id="back">← Agents</button>'));
  wrap.querySelector('#back').onclick=()=>{ view='agents'; render(); };
  let a;
  try { a = await api('/api/agents/'+id); } catch(err){ wrap.appendChild($(`<div class="card err">${esc(err.message)}</div>`)); return; }
  const head = $('<div class="card"></div>');
  head.innerHTML = `<div class="row" style="justify-content:space-between"><h2 style="margin:0">${esc(a.name)} <span class="muted" style="font-size:13px">v${a.version}</span></h2>
    <span class="badge ${a.status==='live'?'live':'paused'}">${a.status}</span></div>
    <div class="muted">${esc(a.goal)}</div>
    <div style="margin-top:8px">${a.spec.in_scope_topics.map(t=>`<span class="pill">✓ ${esc(t)}</span>`).join('')}
      ${a.spec.out_of_scope_topics.map(t=>`<span class="pill">✗ ${esc(t)}</span>`).join('')}</div>
    <div style="margin-top:8px"><span class="pill">${esc(a.model)}</span><span class="pill">📱 ${esc(a.phoneNumberId)}</span>
      ${a.spec.tools.map(t=>`<span class="pill">🔧 ${esc(t.name)}</span>`).join('')}</div>
    ${a.spec.workflow.mode==='router'
      ? `<div style="margin-top:10px"><b>Workflow:</b> router → ${a.spec.sub_agents.length} sub-agents
         <div style="margin-top:4px">${a.spec.workflow.routes.map(r=>`<span class="pill">🧭 ${esc(r.intent)} → ${esc(r.target)}</span>`).join('')}</div>
         <div style="margin-top:4px">${a.spec.sub_agents.map(s=>`<span class="pill">🤖 ${esc(s.name)}${s.tool_names.length?(' ['+s.tool_names.map(esc).join(', ')+']'):''}</span>`).join('')}</div></div>`
      : `<div style="margin-top:10px muted"><b>Workflow:</b> <span class="muted">single agent</span></div>`}
    <div style="margin-top:10px">${(a.listenChats&&a.listenChats.length)?('<b>Listening on:</b> '+a.listenChats.map(c=>`<span class="pill">💬 ${esc(c.name)}</span>`).join('')):'<span class="muted"><b>Listening on:</b> no chats selected (chosen during creation)</span>'}</div>
    <div class="row" style="margin-top:12px"><button id="toggle">${a.status==='live'?'Pause':'Resume'}</button>
    <button class="ghost" id="showspec">View AgentSpec</button>
    <button id="editchats">✏️ Edit chats</button>
    ${whatsapp.configured ? `<button id="connectwa" class="${whatsapp.boundAgentId===a.id?'':'primary'}">${whatsapp.boundAgentId===a.id?'✓ Cloud API connected':'📲 Connect Cloud API ('+esc(whatsapp.phoneNumberId)+')'}</button>` : ''}</div>
    <pre id="spec" style="display:none;margin-top:10px">${esc(JSON.stringify(a.spec,null,2))}</pre>
    <div id="chatedit"></div>`;
  head.querySelector('#toggle').onclick = async ()=>{ await api('/api/agents/'+id+'/'+(a.status==='live'?'pause':'resume'),'POST'); render(); };
  head.querySelector('#showspec').onclick = ()=>{ const p=head.querySelector('#spec'); p.style.display = p.style.display==='none'?'block':'none'; };
  head.querySelector('#editchats').onclick = ()=>{ const c=head.querySelector('#chatedit');
    if (c.dataset.open){ c.innerHTML=''; delete c.dataset.open; return; }
    c.dataset.open='1';
    buildChatPicker(c, a.listenChats||[], 'Save chats', async (chats, btn)=>{ btn.disabled=true;
      try{ await api('/api/agents/'+id+'/chats','POST',{ chats }); render(); }
      catch(e){ alert(e.message); btn.disabled=false; } }); };
  const cw = head.querySelector('#connectwa');
  if (cw && whatsapp.boundAgentId!==a.id) cw.onclick = async ()=>{ cw.disabled=true;
    try{ const r=await api('/api/agents/'+id+'/connect-whatsapp','POST'); whatsapp.boundAgentId=r.boundAgentId; render(); }
    catch(e){ alert(e.message); cw.disabled=false; } };
  wrap.appendChild(head);

  // WhatsApp simulator
  const sim = $('<div class="card"></div>');
  sim.innerHTML = `<h2>WhatsApp simulator</h2><div class="muted" style="margin-bottom:8px">Sends a real inbound message through the gateway → resolver → cost/abuse breaker → agent runtime → reply. (LLM + WhatsApp transport are stubbed locally.)</div>
    <div class="chat" id="chat"></div>
    <div class="composer"><input id="msg" placeholder="Message this agent…"/><button class="primary" id="send">Send</button></div>`;
  wrap.appendChild(sim);
  const chat = sim.querySelector('#chat');
  const from = '+15550000001';
  const addBub = (who, text)=>{ const b=$(`<div class="bub ${who}"></div>`); b.textContent=text; chat.appendChild(b); chat.scrollTop=chat.scrollHeight; };
  const loadHist = async ()=>{ const {history}=await api('/api/sim/history?agentId='+encodeURIComponent(id)+'&from='+encodeURIComponent(from)); chat.innerHTML=''; history.forEach(m=>addBub(m.role==='user'?'me':'bot', m.content)); if(!history.length) addBub('bot','(no messages yet — say hi)'); };
  await loadHist();
  const send = async ()=>{ const inp=sim.querySelector('#msg'); const text=inp.value.trim(); if(!text) return; inp.value=''; addBub('me',text);
    try{ const out = await api('/api/sim/send','POST',{ agentId:id, from, text });
      if(out.reply) addBub('bot', (out.routedTo && out.routedTo!=='default' ? '🧭 routed → '+out.routedTo+'\n' : '') + out.reply);
      else addBub('bot','(no reply'+(out.blocked?': '+out.blocked:'')+')'); }
    catch(err){ addBub('bot','⚠ '+err.message); } };
  sim.querySelector('#send').onclick = send;
  sim.querySelector('#msg').addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });

  // Self-improvement panel
  const imp = $('<div class="card"></div>');
  imp.innerHTML = `<h2>Self-improvement</h2><div class="muted" style="margin-bottom:8px">Reviews recent conversations and proposes AgentSpec edits you approve. Approved changes bump the agent's version.</div>
    <button id="suggest">Suggest improvements</button><div id="sugg" style="margin-top:10px"></div>`;
  wrap.appendChild(imp);
  imp.querySelector('#suggest').onclick = async ()=>{ const box=imp.querySelector('#sugg'); box.innerHTML='<span class="muted">Analyzing transcripts…</span>';
    try{ const r = await api('/api/agents/'+id+'/suggest','POST');
      if(!r.suggestions.length){ box.innerHTML='<span class="muted">'+esc(r.summary)+' Chat with the agent above first, then try again.</span>'; return; }
      box.innerHTML = '<div class="muted" style="margin-bottom:8px">'+esc(r.summary)+'</div>';
      r.suggestions.forEach((s,i)=>{ const row=$('<label style="display:block;margin:6px 0"></label>');
        row.innerHTML = `<input type="checkbox" data-i="${i}" checked/> <b>${esc(s.kind)}</b> — ${esc(s.value)} <span class="muted">(${esc(s.rationale)})</span>`;
        box.appendChild(row); });
      const apply=$('<button class="primary" style="margin-top:10px">Apply selected</button>');
      apply.onclick = async ()=>{ apply.disabled=true;
        const chosen=[...box.querySelectorAll('input[type=checkbox]')].filter(c=>c.checked).map(c=>r.suggestions[+c.dataset.i]);
        const res = await api('/api/agents/'+id+'/apply','POST',{ suggestions: chosen });
        box.appendChild($(`<div class="ok" style="margin-top:8px">Applied — agent is now v${res.version}. Reloading…</div>`));
        setTimeout(()=>render(),800); };
      box.appendChild(apply);
    }catch(err){ box.innerHTML='<span class="err">'+esc(err.message)+'</span>'; } };
}

async function WhatsAppView(wrap){
  wrap.appendChild($('<h1>WhatsApp — link your number (QR)</h1>'));
  wrap.appendChild($('<div class="card" style="border-color:#8a6d3b">⚠️ <b>POC only.</b> This links your <i>personal</i> WhatsApp via the unofficial WhatsApp-Web protocol — against WhatsApp\'s ToS, with a real risk of the number being banned. Prefer a spare SIM. The Cloud API path is the production-safe option.</div>'));
  const card = $('<div class="card"></div>');
  wrap.appendChild(card);
  async function refresh(){
    let s; try { s = await api('/api/wa/status'); } catch(e){ card.innerHTML = '<span class="err">'+esc(e.message)+'</span>'; return; }
    if (s.status === 'connected'){
      card.innerHTML = `<div class="ok" style="font-size:16px">✓ Linked${s.me?(' as +'+esc(s.me)):''}</div>
        <div class="muted" style="margin-top:8px">Each agent replies only in the chats picked during its creation. Use <b>+ Create agent</b> and select its chats.</div>
        <div class="muted" style="margin-top:6px">Then message <b>+${esc(s.me||'your number')}</b> from a selected chat — the agent (WAT + Claude) replies; unselected chats are ignored.</div>`;
      if (waPollTimer){ clearInterval(waPollTimer); waPollTimer=null; }
    } else if (s.status === 'qr' && s.qrDataUrl){
      card.innerHTML = `<div>On your phone: <b>WhatsApp → Settings → Linked devices → Link a device</b>, then scan this code:</div>
        <img alt="WhatsApp QR" src="${s.qrDataUrl}" style="width:264px;height:264px;background:#fff;border-radius:8px;margin-top:12px"/>
        <div class="muted" style="margin-top:8px">Waiting for the scan… (the code refreshes automatically)</div>`;
    } else if (s.status === 'connecting'){
      card.innerHTML = '<span class="muted">Connecting to WhatsApp… generating QR…</span>';
    } else {
      card.innerHTML = '';
      const b = $('<button class="primary">Link my WhatsApp</button>');
      b.onclick = async ()=>{ b.disabled=true; try{ await api('/api/wa/link','POST'); refresh(); }catch(e){ card.innerHTML='<span class="err">'+esc(e.message)+'</span>'; } };
      card.appendChild(b);
    }
  }
  await refresh();
  waPollTimer = setInterval(refresh, 2500);
}

async function ActivityView(wrap){
  wrap.appendChild($('<h1>Activity</h1>'));
  wrap.appendChild($('<div class="muted" style="margin-bottom:14px">Live feed of inbound → routing → reply across your tenant\'s agents (simulator 🧪 + WhatsApp 📱). Newest first, refreshes automatically.</div>'));
  const card=$('<div class="card"></div>'); wrap.appendChild(card);
  async function refresh(){
    let r; try{ r=await api('/api/activity'); }catch(e){ card.innerHTML='<span class="err">'+esc(e.message)+'</span>'; return; }
    if(!r.events.length){ card.innerHTML='<span class="muted">No activity yet. Use an agent\'s simulator, or message a linked chat.</span>'; return; }
    card.innerHTML = r.events.map(e=>{
      const when=new Date(e.ts).toLocaleTimeString();
      const ch = e.channel==='whatsapp'?'📱':'🧪';
      const route = e.blocked ? '<span class="err">⛔ '+esc(e.blocked)+'</span>' : (e.routedTo && e.routedTo!=='default' ? '🧭 '+esc(e.routedTo) : '<span class="muted">default</span>');
      const reply = e.reply ? esc(e.reply.slice(0,200)) : '<span class="muted">(no reply)</span>';
      return `<div style="border-bottom:1px solid var(--line);padding:8px 0">
        <div class="muted" style="font-size:12px">${when} · ${ch} <b>${esc(e.agentName)}</b> · from ${esc(e.from)}${e.chatId?(' · '+esc(String(e.chatId).split('@')[0])):''} · ${route}</div>
        <div style="margin-top:2px">“${esc(e.text.slice(0,200))}”</div>
        <div style="margin-top:2px">↳ ${reply}</div></div>`;
    }).join('');
  }
  await refresh();
  waPollTimer = setInterval(refresh, 3000);
}

// Reusable chat allow-list picker (used by the wizard and by "Edit chats"). Renders into
// `container`; calls onSave(chats, saveBtn) when the user confirms. Falls back to a link prompt
// when WhatsApp isn't connected.
// --- WhatsApp avatar helpers: initials fallback rendered instantly, photo swapped in lazily ---
const _waPhotoCache = new Map(); // jid -> Promise<string|null> (dedupes in-flight + caches result)
// Throttle photo fetches to a few at a time so 100 avatars never saturate the browser's
// ~6-connection-per-host pool (which would stall navigation/other requests).
let _waInflight = 0; const _waQ = [];
function _waPump(){ while(_waInflight < 5 && _waQ.length){ const it=_waQ.shift(); _waInflight++;
  api('/api/wa/photo?jid='+encodeURIComponent(it.jid)).then(r=>(r&&r.url)||null).catch(()=>null).then(u=>{ _waInflight--; it.res(u); _waPump(); }); } }
function waPhoto(jid){ if(!_waPhotoCache.has(jid)){ _waPhotoCache.set(jid, new Promise(res=>{ _waQ.push({jid,res}); _waPump(); })); } return _waPhotoCache.get(jid); }
function waInitials(name){ const s=String(name||'').trim(); if(!s) return '?'; const p=s.split(/\s+/); return ((p[0][0]||'')+(p.length>1?(p[p.length-1][0]||''):'')).toUpperCase(); }
function avatarEl(c, size){ size=size||32; const a=$('<span class="wa-av"></span>'); a.style.width=a.style.height=size+'px'; a.style.lineHeight=size+'px'; a.style.fontSize=Math.round(size*0.4)+'px'; a.textContent=waInitials(c.name); a.title=c.name;
  if(c.isGroup) a.classList.add('grp');
  waPhoto(c.id).then(url=>{ if(!url) return; const img=new Image(); img.onload=()=>{ a.textContent=''; a.style.backgroundImage='url("'+url+'")'; a.classList.add('img'); }; img.src=url; });
  return a; }

async function buildChatPicker(container, preselected, saveLabel, onSave){
  container.innerHTML='';
  const box=$('<div class="card" style="margin-top:8px"></div>'); container.appendChild(box);
  let st; try{ st=await api('/api/wa/status'); }catch{ st={status:'disconnected'}; }
  if (st.status!=='connected'){
    box.innerHTML='<div class="muted">Your WhatsApp isn\'t linked yet — link it to choose chats.</div>';
    const lb=$('<button class="primary" style="margin-top:8px">Link my WhatsApp</button>');
    lb.onclick=async()=>{ lb.disabled=true; try{ await api('/api/wa/link','POST'); }catch{}
      const poll=setInterval(async()=>{ let s; try{ s=await api('/api/wa/status'); }catch{ return; }
        if(s.status==='qr'&&s.qrDataUrl){ box.innerHTML='<div>Scan in WhatsApp → Settings → Linked devices → Link a device:</div><img alt="QR" src="'+s.qrDataUrl+'" style="width:240px;height:240px;background:#fff;border-radius:8px;margin-top:8px"/>'; }
        if(s.status==='connected'){ clearInterval(poll); buildChatPicker(container, preselected, saveLabel, onSave); } }, 2500); };
    box.appendChild(lb); return;
  }
  const selected=new Map((preselected||[]).map(c=>[c.id,{id:c.id,name:c.name,isGroup:String(c.id).endsWith('@g.us')}]));
  box.innerHTML='<b>Which chats should this agent answer?</b><div class="muted" style="margin:4px 0 8px">Search your contacts and groups by name or number, then tick the ones to listen on.</div>';
  const search=$('<input placeholder="Search chats/contacts…"/>'); box.appendChild(search);
  const chips=$('<div style="margin:8px 0"></div>'); box.appendChild(chips);
  const results=$('<div style="max-height:240px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:6px;margin-top:6px"></div>'); box.appendChild(results);
  const save=$('<button class="primary" style="margin-top:10px" disabled></button>'); save.textContent=saveLabel; box.appendChild(save);
  function renderChips(){ chips.innerHTML='';
    if(!selected.size){ chips.appendChild($('<span class="muted">none selected yet</span>')); save.disabled=true; return; }
    [...selected.values()].forEach(c=>{ const pill=$('<span class="pill" style="display:inline-flex;align-items:center;gap:5px;margin:2px"></span>');
      pill.appendChild(avatarEl(c,18)); const t=$('<span dir="auto"></span>'); t.textContent=c.name; pill.appendChild(t);
      if(c.isGroup) pill.appendChild($('<span>👥</span>')); chips.appendChild(pill); });
    save.disabled=false; }
  async function doSearch(){ let r; try{ r=await api('/api/wa/chats?q='+encodeURIComponent(search.value.trim())); }catch{ r={chats:[]}; }
    results.innerHTML = r.chats.length ? '' : '<span class="muted">No matches (try a name or number; chats appear after they sync).</span>';
    r.chats.forEach(c=>{ const row=$('<label style="display:flex;align-items:center;gap:8px;padding:5px 2px;cursor:pointer"></label>');
      const cb=$('<input type="checkbox"/>'); cb.checked=selected.has(c.id);
      const name=$('<span dir="auto" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>'); name.textContent=c.name;
      row.appendChild(cb); row.appendChild(avatarEl(c,32)); row.appendChild(name);
      if(c.isGroup) row.appendChild($('<span class="pill" title="Group" style="flex:0 0 auto">👥</span>'));
      cb.onchange=(e)=>{ if(e.target.checked) selected.set(c.id,{id:c.id,name:c.name,isGroup:c.isGroup}); else selected.delete(c.id); renderChips(); };
      results.appendChild(row); }); }
  let t; search.addEventListener('input', ()=>{ clearTimeout(t); t=setTimeout(doSearch, 300); });
  save.onclick=()=> onSave([...selected.values()].map(c=>({id:c.id,name:c.name})), save);
  renderChips(); doSearch();
}

async function CreateView(wrap){
  wrap.appendChild($('<h1>Create a new agent</h1>'));
  wrap.appendChild($('<div class="muted" style="margin-bottom:12px">Answer a few questions — Whaser assembles a precise, validated agent spec. (This is Whaser\'s differentiator: a conversation, not a flow canvas.)</div>'));
  const card = $('<div class="card"></div>');
  card.innerHTML = `<div class="chat" id="chat"></div>
    <div class="composer"><input id="msg" placeholder="Type your answer…" disabled/><button class="primary" id="send" disabled>Send</button></div>
    <div id="actions" style="margin-top:12px"></div>`;
  wrap.appendChild(card);
  const chat=card.querySelector('#chat'), input=card.querySelector('#msg'), sendBtn=card.querySelector('#send'), actions=card.querySelector('#actions');
  const addBub=(who,text)=>{ const b=$(`<div class="bub ${who}"></div>`); b.textContent=text; chat.appendChild(b); chat.scrollTop=chat.scrollHeight; };
  let sessionId=null, stage='collecting';

  try {
    const s = await api('/api/wizard/start','POST');
    sessionId=s.sessionId; addBub('bot', s.greeting);
    if (s.prompt.kind==='ask') addBub('bot', s.prompt.question);
    input.disabled=false; sendBtn.disabled=false; input.focus();
  } catch(err){ addBub('bot','⚠ '+err.message); return; }

  function handlePrompt(p){
    if (p.kind==='ask'){ addBub('bot', p.question); }
    else if (p.kind==='select_chats'){ addBub('bot', p.question); stage='chats'; input.disabled=true; sendBtn.disabled=true; renderChatPicker(); }
    else { stage='confirm'; addBub('bot', p.text); input.disabled=true; sendBtn.disabled=true; showBuild(); }
  }
  const ask = async ()=>{ const text=input.value.trim(); if(!text || stage!=='collecting') return; input.value=''; addBub('me',text);
    const r = await api('/api/wizard/answer','POST',{ sessionId, text }); handlePrompt(r.prompt);
  };

  function renderChatPicker(){
    buildChatPicker(actions, [], 'Continue', async (chats)=>{
      addBub('me','Listen on: '+chats.map(c=>c.name).join(', '));
      const r=await api('/api/wizard/select-chats','POST',{ sessionId, chats });
      actions.innerHTML=''; handlePrompt(r.prompt);
    });
  }
  sendBtn.onclick = ()=> ask().catch(e=>addBub('bot','⚠ '+e.message));
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') sendBtn.onclick(); });

  function showBuild(){
    actions.innerHTML='';
    const b=$('<button class="primary">Build the agent</button>');
    b.onclick = async ()=>{ b.disabled=true; try{
      const r = await api('/api/wizard/finalize','POST',{ sessionId });
      const box=$('<div class="card" style="margin-top:8px"></div>');
      const status = r.publishable ? '<span class="ok">✓ valid & consistent — ready to publish</span>'
        : '<span class="err">needs attention</span>';
      box.innerHTML = `<h2>Generated AgentSpec</h2><div style="margin-bottom:8px">${status}</div>
        ${r.schemaErrors.length?`<div class="err">Schema: ${r.schemaErrors.map(esc).join('; ')}</div>`:''}
        ${r.issues.length?`<div class="err">Consistency: ${r.issues.map(i=>esc(i.message)).join('; ')}</div>`:''}
        <pre>${esc(JSON.stringify(r.spec,null,2))}</pre>`;
      actions.appendChild(box);
      if (r.publishable){ const p=$('<button class="primary" style="margin-top:10px">Publish & bind a number</button>');
        p.onclick = async ()=>{ p.disabled=true; const pub=await api('/api/wizard/publish','POST',{ sessionId });
          actions.appendChild($(`<div class="ok" style="margin-top:10px">Published as ${esc(pub.agentId)} on ${esc(pub.phoneNumberId)}. Opening…</div>`));
          setTimeout(()=>{ view='agent:'+pub.agentId; render(); }, 700); };
        actions.appendChild(p);
      }
    }catch(err){ actions.appendChild($(`<div class="err">${esc(err.message)}</div>`)); b.disabled=false; } };
    actions.appendChild(b);
  }
}

(async function init(){ if (token){ try{ const d=await api('/api/me'); user=d.user; mode=d.mode||'stub'; whatsapp=d.whatsapp||whatsapp; }catch{} } render(); })();
